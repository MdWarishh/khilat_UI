<!-- src/app/components/checkout/shipping-form/shipping-form.component.html -->
<div class="sf-card">
  <h2 class="sf-title">Shipping &amp; Billing Details</h2>

  <form (ngSubmit)="onSubmit()" novalidate>

    <div class="form-group">
      <label>Full Name <span class="req">*</span></label>
      <input type="text" [(ngModel)]="form.fullName" name="fullName"
             [class.invalid]="submitted && !form.fullName.trim()"
             placeholder="Enter your full name">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email <span class="req">*</span></label>
        <input type="email" [(ngModel)]="form.email" name="email"
               [class.invalid]="submitted && (!form.email.trim() || !isValidEmail(form.email))"
               placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Phone <span class="req">*</span></label>
        <input type="tel" [(ngModel)]="form.phone" name="phone" maxlength="10"
               [class.invalid]="submitted && (!form.phone.trim() || !isValidPhone(form.phone))"
               placeholder="10-digit mobile number">
      </div>
    </div>

    <div class="form-group">
      <label>Address <span class="req">*</span></label>
      <input type="text" [(ngModel)]="form.addressLine1" name="addressLine1"
             [class.invalid]="submitted && !form.addressLine1.trim()"
             placeholder="House no, Street name, Area">
    </div>

    <div class="form-row form-row-3">
      <div class="form-group">
        <label>City <span class="req">*</span></label>
        <input type="text" [(ngModel)]="form.city" name="city"
               [class.invalid]="submitted && !form.city.trim()"
               placeholder="City">
      </div>
      <div class="form-group">
        <label>State <span class="req">*</span></label>
        <input type="text" [(ngModel)]="form.state" name="state"
               [class.invalid]="submitted && !form.state.trim()"
               placeholder="State">
      </div>
      <div class="form-group">
        <label>Pincode <span class="req">*</span></label>
        <input type="text" [(ngModel)]="form.pincode" name="pincode" maxlength="6"
               [class.invalid]="submitted && (!form.pincode.trim() || form.pincode.length !== 6)"
               placeholder="6-digit">
      </div>
    </div>

    <div class="validation-hint" *ngIf="submitted && !isValid()">
      Please fill all required fields correctly.
    </div>

    <button type="submit" class="btn-primary" [disabled]="loading">
      <span *ngIf="!loading">Continue to Payment →</span>
      <span *ngIf="loading" class="btn-loading">
        <span class="spinner"></span> Setting up payment...
      </span>
    </button>

  </form>
</div>
