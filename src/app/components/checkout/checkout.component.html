<!-- src/app/components/checkout/checkout.component.html -->
<div class="checkout-page">
  <div class="checkout-container">

    <h1 class="page-title">Checkout</h1>

    <!-- Step indicator -->
    <app-checkout-steps [currentStep]="currentStep"></app-checkout-steps>

    <!-- Global error (step 1 API errors) -->
    <div class="global-error" *ngIf="errorMessage && currentStep === 1">
      {{ errorMessage }}
    </div>

    <div class="checkout-layout">

      <!-- Left col -->
      <div class="left-col">

        <!-- Step 1: Shipping -->
        <app-shipping-form
          *ngIf="currentStep === 1"
          [form]="form"
          [loading]="loading"
          (formSubmitted)="onShippingSubmitted($event)">
        </app-shipping-form>

        <!-- Step 2: Payment -->
        <app-payment-form
          *ngIf="currentStep === 2"
          [form]="form"
          [clientSecret]="clientSecret"
          [total]="total"
          (goBack)="goBackToShipping()"
          (paymentSuccess)="onPaymentSuccess($event)"
          (paymentFailed)="onPaymentFailed($event)">
        </app-payment-form>

      </div>

      <!-- Right col: Order summary -->
      <app-order-summary
        [cartItems]="cartItems"
        [subtotal]="subtotal"
        [shipping]="shipping"
        [total]="total">
      </app-order-summary>

    </div>
  </div>
</div>
