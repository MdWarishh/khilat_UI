<!-- src/app/admin/categories/categories.component.html -->
<div class="categories-page">

  <!-- Toast -->
  <div class="toast" *ngIf="toast"
       [class.toast-success]="toast.type === 'success'"
       [class.toast-error]="toast.type === 'error'">
    <span class="toast-icon">
      <svg *ngIf="toast.type === 'success'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <svg *ngIf="toast.type === 'error'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </span>
    {{ toast.msg }}
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" *ngIf="deleteConfirmId !== null" (click)="cancelDelete()">
    <div class="confirm-box" (click)="$event.stopPropagation()">
      <div class="confirm-icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
      </div>
      <h3 class="confirm-title">Delete Category?</h3>
      <p class="confirm-msg">This action cannot be undone. Products in this category may be affected.</p>
      <div class="confirm-actions">
        <button class="btn-cancel-confirm" (click)="cancelDelete()">Cancel</button>
        <button class="btn-delete-confirm" (click)="confirmDelete()">Yes, Delete</button>
      </div>
    </div>
  </div>

  <!-- Page Header -->
  <div class="page-header">
    <div class="header-left">
      <h2 class="section-title">Categ<em>ories</em></h2>
      <span class="cat-count" *ngIf="!loading">{{ categories.length }} total</span>
    </div>
    <button class="btn-add" (click)="openAdd()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add Category
    </button>
  </div>

  <!-- Loading -->
  <div class="loading-wrap" *ngIf="loading">
    <div class="spinner"></div>
    <p>Loading categories...</p>
  </div>

  <!-- Categories Grid -->
  <div class="cat-grid" *ngIf="!loading && categories.length > 0">
    <div class="cat-card"
         *ngFor="let cat of categories; let i = index"
         [style.animation-delay]="(i * 0.05) + 's'">

      <div class="cat-card-left">
        <div class="cat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <div class="cat-info">
          <span class="cat-name">{{ cat.name }}</span>
          <span class="cat-id">#{{ cat.id }}</span>
        </div>
      </div>

      <div class="cat-actions">
        <button class="btn-icon edit" (click)="openEdit(cat)" title="Edit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="btn-icon delete" (click)="onDeleteRequest(cat.id)" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!loading && categories.length === 0">
    <span class="empty-icon">🏷️</span>
    <h3>No categories yet</h3>
    <p>Add your first category to get started</p>
  </div>

  <!-- Add / Edit Modal -->
  <app-category-form
    [visible]="modalVisible"
    [editData]="editData"
    [saving]="saving"
    (save)="onSave($event)"
    (cancel)="closeModal()">
  </app-category-form>

</div>
