<!-- src/app/admin/categories/category-list/category-list.component.html -->

<!-- ── Loading Skeleton ── -->
<div class="skeleton-wrap" *ngIf="loading">
  <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5]" [style.animation-delay]="(i * 0.06) + 's'">
    <div class="skel skel-avatar"></div>
    <div class="skel skel-num"></div>
    <div class="skel skel-name"></div>
    <div class="skel skel-badge"></div>
    <div class="skel skel-actions"></div>
  </div>
</div>

<!-- ── Empty State ── -->
<div class="empty-state" *ngIf="!loading && categories.length === 0">
  <div class="empty-icon-wrap">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
      <line x1="7" y1="7" x2="7.01" y2="7"/>
    </svg>
  </div>
  <p class="empty-title">No categories yet</p>
  <p class="empty-sub">Click "+ Add Category" to create your first one</p>
</div>

<!-- ── Table ── -->
<div class="table-wrap" *ngIf="!loading && categories.length > 0">
  <table class="cat-table">
    <thead>
      <tr>
        <th class="th-num">#</th>
        <th>Category</th>
        <th>ID</th>
        <th class="th-actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categories; let i = index"
          class="cat-row"
          [style.animation-delay]="(i * 0.04) + 's'">

        <td class="td-num">{{ i + 1 }}</td>

        <td class="td-name">
          <div class="cat-avatar-sm">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/>
              <line x1="7" y1="7" x2="7.01" y2="7"/>
            </svg>
          </div>
          <span class="cat-name-text">{{ cat.name }}</span>
        </td>

        <td class="td-id">
          <span class="id-badge">{{ cat.id }}</span>
        </td>

        <td class="td-actions">
          <div class="action-btns">
            <button class="btn-icon btn-edit" (click)="editCategory.emit(cat)" title="Edit">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon btn-delete" (click)="deleteCategory.emit(cat.id)" title="Delete">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14H6L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
        </td>

      </tr>
    </tbody>
  </table>
</div>
