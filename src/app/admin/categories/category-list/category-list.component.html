<!-- src/app/admin/categories/category-list/category-list.component.html -->

<!-- Loading skeleton -->
<div class="skeleton-wrap" *ngIf="loading">
  <div class="skeleton-row" *ngFor="let i of [1,2,3,4,5]">
    <div class="skel skel-num"></div>
    <div class="skel skel-name"></div>
    <div class="skel skel-actions"></div>
  </div>
</div>

<!-- Empty state -->
<div class="empty-state" *ngIf="!loading && categories.length === 0">
  <div class="empty-icon">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
    </svg>
  </div>
  <p class="empty-title">No categories yet</p>
  <p class="empty-sub">Click "+ Add Category" to create your first one</p>
</div>

<!-- Table -->
<div class="table-wrap" *ngIf="!loading && categories.length > 0">
  <table class="cat-table">
    <thead>
      <tr>
        <th class="th-num">#</th>
        <th>Category Name</th>
        <th class="th-actions">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categories; let i = index" class="cat-row">
        <td class="td-num">{{ i + 1 }}</td>
        <td class="td-name">
          <span class="cat-dot"></span>
          {{ cat.name }}
        </td>
        <td class="td-actions">
          <button class="btn-icon btn-edit" (click)="editCategory.emit(cat)" title="Edit">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn-icon btn-delete" (click)="deleteCategory.emit(cat.id)" title="Delete">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
