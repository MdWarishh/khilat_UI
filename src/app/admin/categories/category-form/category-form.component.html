<!-- src/app/admin/categories/category-form/category-form.component.html -->

<div class="modal-overlay" *ngIf="visible" (click)="onOverlayClick($event)">
  <div class="modal-box">

    <!-- Header -->
    <div class="modal-header">
      <div class="modal-title-wrap">
        <span class="modal-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
          </svg>
        </span>
        <h2 class="modal-title">{{ isEdit ? 'Edit Category' : 'Add Category' }}</h2>
      </div>
      <button class="modal-close" (click)="cancel.emit()" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <!-- Name field -->
      <div class="field-group">
        <label class="field-label">Category Name <span class="required">*</span></label>
        <input
          class="field-input"
          type="text"
          [(ngModel)]="form.name"
          placeholder="e.g. Kurtis, Sarees, Dupattas..."
          [disabled]="saving"
          autofocus />
      </div>

      <!-- Description field -->
      <div class="field-group">
        <label class="field-label">Description <span class="optional">(optional)</span></label>
        <textarea
          class="field-input field-textarea"
          [(ngModel)]="form.description"
          placeholder="Short description about this category..."
          rows="3"
          [disabled]="saving">
        </textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      <button class="btn-cancel" (click)="cancel.emit()" [disabled]="saving">Cancel</button>
      <button class="btn-save" (click)="submit()" [disabled]="saving || !form.name.trim()">
        <span *ngIf="!saving">{{ isEdit ? 'Update' : 'Add Category' }}</span>
        <span *ngIf="saving" class="spinner-wrap">
          <span class="spinner"></span>
          {{ isEdit ? 'Updating...' : 'Adding...' }}
        </span>
      </button>
    </div>

  </div>
</div>
